<div id="mathcros-settings" class="mathcros-custom-css">
	<div class="inline-drawer">
		<div class="inline-drawer-toggle inline-drawer-header">
			<b>Mathcros</b>
			<div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
		</div>

		<div id="mathcros-settings-window" class="inline-drawer-content p-15px">

			<div class="flex-container flex-column separator-bottom">
				<b>Settings</b>

				<label class="flex-container">
					<input id="mathcros-activate-extension" mathcros-setting="enabled" type="checkbox" />
					Enable/Disable the extension
				</label>

				<label class="flex-container">
					<input id="mathcros-experimetal-engine" mathcros-setting="experimentalEngine" type="checkbox" />
					Use Macros 2.0 experimental enginge
				</label>
			</div>

			<div class="flex-container flex-column separator-bottom">
				<b>Debug settings</b>

				<div class="flex-container">
					<input id="mathcros-check-configuration" class="menu_button" type="button" value="Check Configuration" />
					Print the configuration values ​​through the console
				</div>

				<label class="flex-container">
					<input id="mathcros-activate-debug" mathcros-setting="debug" type="checkbox" />
					Enable/Disable the debug console logs
				</label>
			</div>
		</div>
	</div>
</div>
